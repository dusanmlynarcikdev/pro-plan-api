name: Default

on: pull_request

jobs:
  checks:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@database:5432/test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: docker build -t api .

      - name: Lint
        run: docker run api make l

      - name: Types
        run: docker run api make ty

      - name: Start database
        run: |
          docker network create network
          docker run -d \
            --name database \
            --network network \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            postgres:18.3

      - name: Database schema
        run: |
          docker run --network network -e DATABASE_URL="$DATABASE_URL" api make m
          docker run --network network -e DATABASE_URL="$DATABASE_URL" api make d

      - name: Tests
        run: docker run --network network -e DATABASE_URL="$DATABASE_URL" api make t
