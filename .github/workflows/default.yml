name: Default

on: pull_request

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: docker build -t api .

      - name: Lint
        run: docker run api make l

      - name: Types
        run: docker run api make ty

      - name: Tests
        run: |
          docker network create network
          docker run -d \
            --name database \
            --network network \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            postgres:18.3
          docker run --network network api make t
