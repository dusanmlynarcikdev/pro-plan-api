name: Checks

on: pull_request

jobs:
  image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: docker build -t api .

      - name: Save
        run: docker save api -o api.tar

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api.tar

  lint:
    runs-on: ubuntu-latest
    needs: image

    steps:
      - &download_image
        name: Download image
        uses: actions/download-artifact@v4
        with:
          name: api-image

      - &load_image
        name: Load image
        run: docker load -i api.tar

      - name: Lint
        run: docker run api make l

  types:
    runs-on: ubuntu-latest
    needs: image

    steps:
      - *download_image
      - *load_image

      - name: Types
        run: docker run api make ty

  tests:
    runs-on: ubuntu-latest
    needs: image

    steps:
      - *download_image
      - *load_image

      - name: Tests
        run: |
          docker network create network
          docker run -d \
            --name database \
            --network network \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            postgres:18.3-alpine
          docker run --network network api make t
