name: pro-plan-api

services:
  api:
    build:
      context: .
    command: fastapi dev app/presentation/api/main.py --host 0.0.0.0 --port 80
    container_name: api
    depends_on:
      database:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL
      - EMAIL_SENDER
      - SMTP_DSN
    ports:
      - '80:80'
    restart: always
    volumes:
      - ./:/code

  database:
    container_name: database
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    image: postgres:18.3
    ports:
      - '5432:5432'
    restart: always
    volumes:
      - ./.docker/postgres:/var/lib/postgresql

  mailcatcher:
    container_name: mailcatcher
    image: schickling/mailcatcher
    ports:
      - '81:1080'
    restart: always

  migrations:
    build:
      context: .
    command: make m
    container_name: migrations
    depends_on:
      - database
    environment:
      - DATABASE_URL
    restart: on-failure:10
