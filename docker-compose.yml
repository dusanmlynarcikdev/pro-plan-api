name: pro-subscription-management-api

services:
  api:
    build:
      context: .
    command: fastapi dev app/main.py --host 0.0.0.0 --port 80
    container_name: api
    depends_on:
      - database
    ports:
      - '80:80'
    restart: always
    volumes:
      - ./app:/code/app
      - ./tests:/code/tests
      - ./Makefile:/code/Makefile
      - ./pyproject.toml:/code/pyproject.toml
      - ./uv.lock:/code/uv.lock

  database:
    container_name: database
    environment:
      POSTGRES_PASSWORD: postgres
    image: postgres:18.3
    ports:
      - '5432:5432'
    restart: always
    volumes:
      - ./.docker/postgres:/var/lib/postgresql
