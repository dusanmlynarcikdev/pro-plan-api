name: pro-plan-api

x-api-image: &api-image ghcr.io/dusanmlynarcikdev/pro-plan-api

services:
  api:
    command: fastapi run app/presentation/api/main.py --host 0.0.0.0 --port 80
    container_name: api
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL?required}
      STRIPE_API_KEY: ${STRIPE_API_KEY?required}
      STRIPE_PRICE_ID_MONTHLY: ${STRIPE_PRICE_ID_MONTHLY?required}
      STRIPE_PRICE_ID_YEARLY: ${STRIPE_PRICE_ID_YEARLY?required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET?required}
    image: *api-image
    ports:
      - "${API_PORT:-8081}:80"
    restart: always
    volumes:
      - pro-plan-api:/data

  migrations:
    command: make m
    container_name: migrations
    environment:
      DATABASE_URL: ${DATABASE_URL?required}
    image: *api-image
    restart: on-failure:3

volumes:
  pro-plan-api:
