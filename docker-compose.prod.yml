name: pro-plan-api

x-api-defaults: &api-defaults
  image: ghcr.io/dusanmlynarcikdev/pro-plan-api:${API_VERSION:-latest}
  pull_policy: always

services:
  api:
    <<: *api-defaults
    command: fastapi run app/presentation/api/main.py --host 0.0.0.0 --port 80
    container_name: pro-plan-api
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL?required}
      STRIPE_API_KEY: ${STRIPE_API_KEY?required}
      STRIPE_PRICE_ID_MONTHLY: ${STRIPE_PRICE_ID_MONTHLY?required}
      STRIPE_PRICE_ID_YEARLY: ${STRIPE_PRICE_ID_YEARLY?required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET?required}
    ports:
      - "${API_PORT:-8081}:80"
    restart: always
    volumes:
      - pro-plan-api:/data

  migrations:
    <<: *api-defaults
    command: make m
    environment:
      DATABASE_URL: ${DATABASE_URL?required}
    restart: on-failure:3

volumes:
  pro-plan-api:
