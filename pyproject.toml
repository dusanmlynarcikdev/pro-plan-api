[project]
name = "pro-subscription-management-api"
version = "0.0.0"
description = "A reference implementation of a Pro subscription management REST API built with Clean Architecture and FastAPI in Python."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi[standard]>=0.135.2",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "ty>=0.0.24",
]

[dependency-groups]
dev = [
    "ruff>=0.15.7",
]
